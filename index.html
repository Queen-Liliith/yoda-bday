<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YODA | THE KYBER ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a;
            --blue: #00d4ff;
            --green: #39ff14;
            --yellow: #ffd700;
            --purple: #bf00ff;
            --white: #ffffff;
        }

        body {
            margin: 0; background: var(--bg); color: #e0f7fa;
            font-family: 'Share Tech Mono', monospace;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            background-attachment: fixed;
        }

        header { text-align: center; padding: 80px 20px 40px; }
        h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); letter-spacing: 15px; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .motto { color: var(--yellow); font-size: 0.8rem; letter-spacing: 4px; margin-top: 15px; text-transform: uppercase; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Форма */
        .form-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 4px; margin-bottom: 60px;
            display: none; backdrop-filter: blur(10px);
        }

        .color-selector { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .color-btn {
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: 0.3s;
        }
        .color-btn.selected { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 15px currentColor; }

        #color-info {
            text-align: center; min-height: 45px; margin-bottom: 20px;
            font-size: 0.9rem; line-height: 1.4; transition: 0.3s;
        }

        input, textarea {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 12px 0; margin-bottom: 20px; font-family: 'Share Tech Mono'; outline: none;
        }

        .guide-text { font-size: 0.75rem; color: var(--yellow); margin-bottom: 5px; opacity: 0.8; text-transform: uppercase; }

        /* Карточки */
        .card {
            padding: 30px; margin-bottom: 60px; position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--accent);
            box-shadow: -10px 0 20px -10px var(--accent);
            opacity: 0; transform: translateY(20px); transition: 0.8s;
        }
        .card.visible { opacity: 1; transform: translateY(0); }

        .card-meta { font-size: 0.7rem; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .sender { font-family: 'Cinzel'; font-size: 1.4rem; color: #fff; margin-bottom: 10px; }
        .prophecy { font-size: 1.1rem; line-height: 1.6; font-style: italic; color: #ced4da; }

        .action-bar { text-align: center; margin-bottom: 50px; }
        button {
            background: transparent; border: 1px solid var(--yellow); color: var(--yellow);
            padding: 10px 30px; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: var(--yellow); color: #000; box-shadow: 0 0 15px var(--yellow); }
    </style>
</head>
<body>

<header>
    <h1>YODA</h1>
    <div class="motto">One with the Force, the Universe celebrates you</div>
</header>

<div class="container">
    <div class="action-bar">
        <button onclick="document.getElementById('post-form').style.display='block'">+ ADD VISION</button>
    </div>

    <div id="post-form" class="form-container">
        <input type="text" id="in-name" placeholder="Enter your Name (Jedi Identity)...">
        
        <div style="text-align:center; font-size: 0.9rem; margin-top: 10px; font-family: 'Cinzel'; color: var(--yellow);">
            SELECT THE ENERGY YOU SEE IN HIM:
        </div>

        <div class="color-selector" id="color-picker">
            <div class="color-btn" data-color="blue" data-label="Guardian" data-desc="GUARDIAN: For his strength, reliability, and protection." style="background: var(--blue);"></div>
            <div class="color-btn" data-color="green" data-label="Consular" data-desc="CONSULAR: For his wisdom, deep thoughts, and great advice." style="background: var(--green);"></div>
            <div class="color-btn" data-color="yellow" data-label="Sentinel" data-desc="SENTINEL: For his balance and being a master of all trades." style="background: var(--yellow);"></div>
            <div class="color-btn" data-color="purple" data-label="Unique Force" data-desc="UNIQUE FORCE: For his rare personality and bold spirit." style="background: var(--purple);"></div>
            <div class="color-btn" data-color="white" data-label="Purity" data-desc="PURITY: For his clear mind and bright new beginnings." style="background: var(--white); border: 1px solid #444;"></div>
        </div>

        <div id="color-info" style="color: #aaa; font-style: italic;">Select a crystal to see its meaning...</div>

        <div class="guide-text">// FOCUS YOUR MIND. REVEAL THE FUTURE:</div>
        <textarea id="in-msg" placeholder="Example: I foresee that in your next year your power will double and new galaxies will open for you..." rows="4"></textarea>
        
        <button id="submit-btn" onclick="sendData()">IMPRINT ON HOLOCRON</button>
    </div>

    <div id="loader" style="text-align:center; opacity:0.5;">SEARCHING THE FORCE...</div>
    <div id="messages-container"></div>
</div>

<script>
    const BIN_ID = '6a00f013adc21f119a7f1112'; 
    const API_KEY = '$2a$10$olrRaS6Oza4/jOD2kp/i9.MBq833opKJVgn6iYNr8wiGc.5AYF9L2';
    let selectedColor = 'blue';
    let selectedLabel = 'Guardian';

    const colorInfo = document.getElementById('color-info');
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedColor = btn.dataset.color;
            selectedLabel = btn.dataset.label;
            
            colorInfo.innerText = btn.dataset.desc;
            colorInfo.style.color = `var(--${selectedColor})`;
            colorInfo.style.textShadow = `0 0 10px var(--${selectedColor})`;
        };
    });

    document.querySelector('[data-color="blue"]').click();

    async function load() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest?nocache=${Math.random()}`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            render(data.record.messages || []);
        } catch (e) { document.getElementById('loader').innerText = "CONNECTION LOST."; }
    }

    function render(msgs) {
        const container = document.getElementById('messages-container');
        document.getElementById('loader').style.display = 'none';
        container.innerHTML = '';
        
        const valid = msgs.filter(m => m.from && m.from.length > 1);

        if (valid.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity:0.3; margin-top:50px;">NO TRANSMISSIONS YET.</div>';
            return;
        }

        [...valid].reverse().forEach((msg, i) => {
            const colorVar = `var(--${msg.color || 'blue'})`;
            const card = document.createElement('div');
            card.className = 'card';
            card.style.setProperty('--accent', colorVar);
            card.innerHTML = `
                <div class="card-meta">Force Vision: ${msg.label || 'Guardian'}</div>
                <div class="sender">${msg.from}</div>
                <div class="prophecy">"${msg.message}"</div>
            `;
            container.appendChild(card);
            setTimeout(() => card.classList.add('visible'), i * 150);
        });
    }

    async function sendData() {
        const btn = document.getElementById('submit-btn');
        const from = document.getElementById('in-name').value.trim();
        const message = document.getElementById('in-msg').value.trim();

        if(from.length < 2 || !message) { alert("The Force requires more details."); return; }

        btn.disabled = true; btn.innerText = 'TRANSMITTING...';

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const currentData = await res.json();
            const updated = currentData.record.messages || [];
            updated.push({ 
                from, 
                message, 
                color: selectedColor,
                label: selectedLabel 
            });

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify({ messages: updated })
            });

            location.reload(); 
        } catch (e) { alert('Archive rejected transmission.'); btn.disabled = false; }
    }

    load();
</script>

</body>
</html>
