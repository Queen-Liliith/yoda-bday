<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoda Transmission</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at top, #16233d 0%, #05070d 55%, #000 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: 'Rajdhani', sans-serif;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 120px 120px, 180px 180px;
      background-position: 0 0, 60px 60px;
      opacity: 0.18;
      animation: starsMove 60s linear infinite;
      pointer-events: none;
    }

    @keyframes starsMove {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(200px);
      }
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(78,162,255,0.28), transparent 70%);
      filter: blur(40px);
      z-index: 0;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 4px;
      text-shadow: 0 0 25px rgba(110,180,255,0.9);
      z-index: 1;
    }

    .subtitle {
      margin-top: 18px;
      font-size: 1.2rem;
      color: #b8d5ff;
      max-width: 700px;
      z-index: 1;
    }

    .birthday {
      margin-top: 24px;
      font-size: 1.1rem;
      color: #ffe59e;
      letter-spacing: 2px;
      z-index: 1;
    }

    .open-btn {
      margin-top: 45px;
      padding: 16px 34px;
      border: 1px solid rgba(121,188,255,0.6);
      background: rgba(13, 24, 47, 0.7);
      color: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Orbitron', sans-serif;
      transition: 0.3s;
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    .open-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 30px rgba(98,171,255,0.5);
    }

    .container {
      width: min(1100px, 92%);
      margin: auto;
      padding-bottom: 100px;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      margin-bottom: 25px;
      color: #d9ebff;
      text-shadow: 0 0 15px rgba(120,190,255,0.4);
    }

    .add-btn {
      margin-bottom: 35px;
      padding: 14px 26px;
      background: rgba(17, 31, 58, 0.9);
      border: 1px solid rgba(122,190,255,0.4);
      border-radius: 14px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    .add-btn:hover {
      box-shadow: 0 0 22px rgba(98,171,255,0.5);
    }

    .cards {
  display: flex;
  flex-direction: column;
  gap: 28px;
  width: min(820px, 100%);
}

    .card {
  position: relative;
  background: rgba(10, 18, 38, 0.72);
  border: 1px solid rgba(114, 185, 255, 0.22);
  border-radius: 24px;
  padding: 30px;
  overflow: hidden;
  backdrop-filter: blur(16px);

  box-shadow:
    0 0 30px rgba(62, 120, 255, 0.08),
    inset 0 0 20px rgba(110, 180, 255, 0.03);

  transition: 0.35s ease;
}

.card:hover {
  transform: translateY(-4px) scale(1.01);
  border-color: rgba(141, 205, 255, 0.45);

  box-shadow:
    0 0 45px rgba(82, 145, 255, 0.2),
    inset 0 0 25px rgba(110, 180, 255, 0.08);
}

    .card::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(
      135deg,
      rgba(120,190,255,0.05),
      transparent 30%,
      transparent 70%,
      rgba(120,190,255,0.04)
    );

  pointer-events: none;
}

.card::after {
  content: "✦";
  position: absolute;
  top: 18px;
  right: 22px;

  color: rgba(145, 208, 255, 0.7);
  font-size: 1rem;

  text-shadow: 0 0 12px rgba(130,190,255,0.9);
}

    .from {
  color: #8cc7ff;
  font-size: 0.95rem;
  letter-spacing: 2px;
  margin-bottom: 24px;
  font-family: 'Orbitron', sans-serif;

  padding-bottom: 14px;
  border-bottom: 1px solid rgba(120,190,255,0.15);
}

    .label {
  color: #ffe59e;
  margin-top: 20px;
  margin-bottom: 8px;
  font-size: 0.82rem;
  letter-spacing: 2px;
  font-family: 'Orbitron', sans-serif;
}

    .text {
  color: #edf6ff;
  line-height: 1.7;
  font-size: 1.08rem;
}

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-box {
      width: min(700px, 100%);
      background: rgba(9,16,30,0.96);
      border: 1px solid rgba(121,188,255,0.25);
      border-radius: 24px;
      padding: 34px;
      position: relative;
      box-shadow: 0 0 50px rgba(80,140,255,0.2);
    }

    .modal-title {
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 25px;
      font-size: 1.6rem;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ffe59e;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(135,196,255,0.2);
      background: rgba(13,23,44,0.8);
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    .hint {
      font-size: 0.9rem;
      color: #8aa7cf;
      margin-top: 5px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(to right, #244c84, #406ec9);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 12px;
      font-family: 'Orbitron', sans-serif;
    }

    .submit-btn:hover {
      filter: brightness(1.1);
    }

    .close {
      position: absolute;
      right: 18px;
      top: 14px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #cfe4ff;
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="glow"></div>

  <h1>YODA</h1>

  <p class="subtitle">
    Сегодня галактика говорит о человеке,
    который оставил след не в одном альянсе.
  </p>

  <p class="birthday">
    ПЕРЕДАЧИ КО ДНЮ РОЖДЕНИЯ ПОСТУПАЮТ СО ВСЕЙ ГАЛАКТИКИ
  </p>

  <button class="open-btn" onclick="scrollToArchive()">
    ОТКРЫТЬ АРХИВ
  </button>
</section>

<div class="container" id="archive">
  <h2 class="section-title">Передачи</h2>

  <button class="add-btn" onclick="openModal()">
    ДОБАВИТЬ ПЕРЕДАЧУ
  </button>

  <div class="cards" id="cards"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">✕</span>

    <h2 class="modal-title">Новая передача</h2>

    <form id="messageForm">

      <div class="input-group">
        <label>ТВОЙ ПОЗЫВНОЙ</label>
        <input type="text" id="nickname" required>
      </div>

      <div class="input-group">
        <label>Что первым приходит тебе в голову, когда ты думаешь о Йоде?</label>
        <textarea id="memory" required></textarea>
        <div class="hint">Воспоминание, атмосфера, ассоциация...</div>
      </div>

      <div class="input-group">
        <label>За что ты ценишь Йоду?</label>
        <textarea id="special"></textarea>
      </div>

      <div class="input-group">
        <label>Что ты хотел(а) бы сказать ему сегодня?</label>
        <textarea id="message"></textarea>
      </div>

      <button class="submit-btn" type="submit">
        ОТПРАВИТЬ ПЕРЕДАЧУ
      </button>

    </form>
  </div>
</div>

<script>
  const BIN_ID = "6a00f013adc21f119a7f1112";
  const API_KEY = "$2a$10$olrRaS6Oza4/jOD2kp/i9.MBq833opKJVgn6iYNr8wiGc.5AYF9L2";

  const cards = document.getElementById('cards');
  const modal = document.getElementById('modal');

  function scrollToArchive() {
    document.getElementById('archive').scrollIntoView({
      behavior: 'smooth'
    });
  }

  function openModal() {
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
  }

  async function loadMessages() {
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: {
          'X-Master-Key': API_KEY
        }
      });

      const data = await res.json();

      cards.innerHTML = '';

      data.record.reverse().forEach(item => {
        createCard(item);
      });

    } catch (err) {
      console.error(err);
    }
  }

  function createCard(item) {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
  <div class="from">
    ✦ ПЕРЕДАЧА ОТ: ${item.nickname}
  </div>

  <div class="label">ПЕРВОЕ ВОСПОМИНАНИЕ</div>
  <div class="text">${item.memory}</div>

  ${item.special ? `
  <div class="label">ЗА ЧТО ЦЕНЯТ</div>
  <div class="text">${item.special}</div>
  ` : ''}

  ${item.message ? `
  <div class="label">СООБЩЕНИЕ ЧЕРЕЗ СИЛУ</div>
  <div class="text">${item.message}</div>
  ` : ''}

`;

    cards.appendChild(card);
  }

  document.getElementById('messageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const newItem = {
      nickname: nickname.value,
      memory: memory.value,
      special: special.value,
      message: message.value
    };

    try {
      const current = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: {
          'X-Master-Key': API_KEY
        }
      });

      const currentData = await current.json();
      const updated = [...currentData.record, newItem];

      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': API_KEY
        },
        body: JSON.stringify(updated)
      });

      createCard(newItem);

      document.getElementById('messageForm').reset();

      closeModal();

      alert('Передача сохранена в архиве ✨');

    } catch (err) {
      console.error(err);
      alert('Ошибка передачи');
    }
  });

  loadMessages();
</script>

</body>
</html>
