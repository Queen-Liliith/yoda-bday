<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YODA BIRTHDAY TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Comfortaa:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: #00f2ff;
            --accent-color: #ffd700;
            --bg-dark: #050508;
            --card-bg: rgba(20, 20, 35, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        /* Анимированный фон со звездами */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: clamp(10px, 2vw, 20px);
            color: #fff;
            text-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.8; text-shadow: 0 0 20px var(--glow-color); }
            to { opacity: 1; text-shadow: 0 0 30px var(--glow-color), 0 0 50px var(--glow-color); }
        }

        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-color);
            margin-top: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Карточка сообщения */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-left: 4px solid var(--glow-color);
            border-radius: 4px 20px 20px 4px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            border-left-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            transform: scale(1.02);
        }

        .sender {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--glow-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            border-bottom: 1px dashed rgba(0, 242, 255, 0.3);
            padding-bottom: 10px;
        }

        .sender::before {
            content: 'ID:';
            font-size: 0.7rem;
            margin-right: 10px;
            opacity: 0.5;
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        .content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #eee;
            white-space: pre-wrap;
        }

        /* Статус загрузки */
        #loader {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--glow-color);
            margin-top: 50px;
            letter-spacing: 2px;
        }

        /* Кнопка добавления */
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        .add-btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 15px 35px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .add-btn:hover {
            background: var(--accent-color);
            color: black;
            box-shadow: 0 0 20px var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <header>
        <h1>YODA</h1>
        <div class="tagline">Перехват поздравлений из глубокого космоса...</div>
    </header>

    <div class="container">
        <div id="loader">Инициализация защищенного канала связи...</div>
        <div id="messages-container"></div>
    </div>

    <script>
        const BIN_ID = '6a0145b2adc21f119a80ba7b';
        const API_KEY = '$2a$10$olrRaS6Oza4/jOD2kp/i9.MBq833opKJVgn6iYNr8wiGc.5AYF9L2';

        async function fetchArchive() {
            const container = document.getElementById('messages-container');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });

                if (!response.ok) throw new Error('Связь прервана империей');
                
                const data = await response.json();
                const messages = data.record.messages;

                loader.style.display = 'none';

                messages.forEach((msg, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    card.innerHTML = `
                        <div class="sender">${msg.from || 'Anonymous Jedi'}</div>
                        <div class="section">
                            <span class="label">Тот самый момент ✨</span>
                            <div class="content">${msg.memory || 'Информация стерта...'}</div>
                        </div>
                        <div class="section">
                            <span class="label">Твоя суперсила 🙌</span>
                            <div class="content">${msg.power || 'Сила скрыта в нем'}</div>
                        </div>
                        <div class="section">
                            <span class="label">Голограмма пожелания ❤️</span>
                            <div class="content">${msg.message || 'С Днем Рождения!'}</div>
                        </div>
                    `;
                    
                    container.appendChild(card);

                    // Плавное появление карточек друг за другом
                    setTimeout(() => {
                        card.classList.add('visible');
                    }, index * 200);
                });

            } catch (err) {
                loader.innerHTML = `<div style="color: #ff4444;">Критическая ошибка: ${err.message}</div>`;
            }
        }

        // Запуск при загрузке
        window.addEventListener('DOMContentLoaded', fetchArchive);
    </script>
</body>
</html>
