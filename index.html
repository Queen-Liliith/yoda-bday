<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YODA | GALACTIC ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Comfortaa:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-color: #00f2ff;
            --accent-color: #ffd700;
            --bg-dark: #050508;
            --card-bg: rgba(20, 20, 35, 0.85);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'Comfortaa', cursive;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 50%), url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        header { text-align: center; padding: 60px 20px 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; margin: 0; text-shadow: 0 0 20px var(--glow-color); letter-spacing: 15px; }
        .tagline { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--accent-color); letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .form-container {
            background: var(--card-bg);
            border: 1px solid var(--glow-color);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 50px;
            display: none; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            color: white;
            padding: 12px;
            margin-bottom: 15px;
            font-family: 'Comfortaa';
            box-sizing: border-box;
            outline: none;
        }

        input:focus, textarea:focus { border-color: var(--glow-color); }

        button {
            background: transparent;
            border: 2px solid var(--glow-color);
            color: var(--glow-color);
            padding: 10px 25px;
            font-family: 'Orbitron';
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: var(--glow-color); color: black; box-shadow: 0 0 20px var(--glow-color); }

        .card {
            background: var(--card-bg);
            border-left: 4px solid var(--glow-color);
            border-radius: 0 15px 15px 0;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            opacity: 0; transform: translateY(20px); transition: 0.5s;
        }
        .card.visible { opacity: 1; transform: translateY(0); }

        .label { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--accent-color); display: block; margin-bottom: 5px; margin-top: 15px; text-transform: uppercase; }
        .sender { font-family: 'Orbitron'; color: var(--glow-color); font-size: 1.3rem; border-bottom: 1px solid rgba(0,242,255,0.2); padding-bottom: 10px; }
        .content { font-size: 1rem; line-height: 1.5; white-space: pre-wrap; color: #e0e0e0; }

        .action-bar { text-align: center; margin-bottom: 40px; }
        #loader { text-align:center; font-family: 'Orbitron'; color: var(--glow-color); }
    </style>
</head>
<body>

<header>
    <h1>YODA</h1>
    <div class="tagline">Intercepting transmissions from deep space...</div>
</header>

<div class="container">
    <div class="action-bar">
        <button onclick="document.getElementById('post-form').style.display='block'">Send Transmission</button>
    </div>

    <div id="post-form" class="form-container">
        <input type="text" id="form-from" placeholder="Your Callsign (Name)">
        <textarea id="form-memory" placeholder="The Core Memory (Shared Moment)" rows="2"></textarea>
        <textarea id="form-power" placeholder="Your Superpower (What we value)" rows="2"></textarea>
        <textarea id="form-message" placeholder="Holographic Wish (Your Message)" rows="3"></textarea>
        <button id="submit-btn" onclick="sendData()">Broadcast to Orbit</button>
    </div>

    <div id="loader">Synchronizing with Archive...</div>
    <div id="messages-container"></div>
</div>

<script>
    const BIN_ID = '6a0145b2adc21f119a80ba7b';
    const API_KEY = '$2a$10$olrRaS6Oza4/jOD2kp/i9.MBq833opKJVgn6iYNr8wiGc.5AYF9L2';

    async function load() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            render(data.record.messages || []);
        } catch (e) { 
            console.error(e);
            document.getElementById('loader').innerText = "Signal lost.";
        }
    }

    function render(msgs) {
        const container = document.getElementById('messages-container');
        document.getElementById('loader').style.display = 'none';
        container.innerHTML = '';
        
        // ВАЖНО: Фильтруем пустые записи, чтобы они не отображались
        const validMessages = msgs.filter(msg => msg.from && msg.from.trim() !== "");

        if (validMessages.length === 0) {
            container.innerHTML = '<div style="text-align:center; opacity: 0.5; font-family: Orbitron;">NO MESSAGES IN ARCHIVE</div>';
            return;
        }

        [...validMessages].reverse().forEach((msg, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="sender">${msg.from}</div>
                <span class="label">The Core Memory ✨</span><div class="content">${msg.memory || '---'}</div>
                <span class="label">Your Superpower 🙌</span><div class="content">${msg.power || '---'}</div>
                <span class="label">Holographic Wish ❤️</span><div class="content">${msg.message || 'Happy Birthday!'}</div>
            `;
            container.appendChild(card);
            setTimeout(() => card.classList.add('visible'), i * 150);
        });
    }

    async function sendData() {
        const btn = document.getElementById('submit-btn');
        const from = document.getElementById('form-from').value.trim();
        const memory = document.getElementById('form-memory').value.trim();
        const power = document.getElementById('form-power').value.trim();
        const message = document.getElementById('form-message').value.trim();

        if(!from) {
            alert("Identification required! Please enter your name.");
            return;
        }

        btn.disabled = true;
        btn.innerText = 'TRANSMITTING...';

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const currentData = await res.json();
            const updatedMessages = currentData.record.messages || [];
            
            updatedMessages.push({ from, memory, power, message });

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify({ messages: updatedMessages })
            });

            location.reload(); 
        } catch (e) {
            alert('Transmission failed!');
            btn.disabled = false;
            btn.innerText = 'TRY AGAIN';
        }
    }

    load();
</script>

</body>
</html>
